<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>YousCoin</title>
  <link rel="manifest" id="manifest-link" href="manifest.json"/>
  <meta name="theme-color" content="#1D9E75"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="YousCoin"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#f7fffe;min-height:100vh;display:flex;flex-direction:column}

    /* ── Loading ── */
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px}
    .spinner{width:44px;height:44px;border:4px solid #d0f2e7;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Error ── */
    #error{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:32px;text-align:center}
    #error .err-icon{font-size:52px}
    #error h2{font-size:18px;font-weight:900;color:#333}
    #error p{font-size:13px;color:#999;font-weight:600;line-height:1.6}

    /* ── Main ── */
    #main{display:none;flex-direction:column;flex:1}

    /* Header */
    .hdr{padding:14px 16px 12px;background:#fff;border-bottom:2px solid #e8f8f3;display:flex;align-items:center;gap:10px}
    .hdr-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
    .hdr-name{font-size:15px;font-weight:900;color:#1a1a1a;flex:1}
    .hdr-tag{font-size:11px;font-weight:700;color:#aaa}

    /* Notification */
    #notif{display:none;margin:12px 14px 0;padding:11px 14px;background:linear-gradient(90deg,#d0f2e7,#e8f8f3);border-radius:14px;align-items:center;gap:10px;border:1.5px solid #9ee8cc}
    #notif i{color:#1D9E75;font-size:22px;flex-shrink:0}
    #notif-text{font-size:12px;color:#0F6E56;font-weight:700;flex:1}

    /* Balance card */
    .bal-card{margin:12px 14px;padding:24px 18px 20px;background:#1D9E75;border-radius:22px;color:#fff;text-align:center;position:relative;overflow:hidden}
    .bal-card::before{content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08)}
    .bal-card::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}
    .bal-lbl{font-size:12px;opacity:.85;margin-bottom:4px;font-weight:700;letter-spacing:.5px}
    .bal-num{font-size:58px;font-weight:900;letter-spacing:-2px;line-height:1;position:relative;z-index:1}
    .bal-num.bump{animation:bump .35s ease}
    @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
    .bal-coin{display:inline-block;margin-top:8px;background:rgba(255,255,255,.22);border-radius:20px;padding:3px 14px;font-size:12px;font-weight:800;letter-spacing:.5px}

    /* Section label */
    .sec-lbl{font-size:11px;color:#1D9E75;font-weight:900;padding:14px 14px 6px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
    .sec-lbl::before{content:'';width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;flex-shrink:0}

    /* Transactions */
    .tx-list{padding:0 14px 100px;overflow-y:auto;flex:1}
    .tx-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1.5px dashed #e0f5ef}
    .tx-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .tx-ic.in{background:#d0f2e7;color:#1D9E75}
    .tx-ic.out{background:#ffe8e8;color:#e05555}
    .tx-inf{flex:1;min-width:0}
    .tx-title{font-size:13px;color:#222;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-date{font-size:11px;color:#bbb;font-weight:600}
    .tx-val{font-size:14px;font-weight:900;white-space:nowrap}
    .tx-val.pos{color:#1D9E75}
    .tx-val.neg{color:#e05555}
    .empty{text-align:center;padding:40px 20px;color:#ccc;font-size:13px;font-weight:700}

    /* iOS install hint */
    #ios-hint{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e8f8f3;padding:12px 16px;flex-direction:column;gap:5px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
    .ios-row{display:flex;align-items:center;gap:8px}
    .ios-text{font-size:13px;color:#333;font-weight:800;flex:1}
    .ios-close{border:none;background:none;font-size:22px;color:#bbb;cursor:pointer;padding:0 4px;line-height:1}
    .ios-steps{font-size:11px;color:#888;font-weight:600;padding-left:28px}

    /* Confetti */
    @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="font-size:13px;color:#999;font-weight:700">Caricamento...</p>
</div>

<div id="error">
  <div class="err-icon">🔗</div>
  <h2>Link non valido</h2>
  <p>Controlla il link che ti è stato condiviso<br>o contatta il tuo host.</p>
</div>

<div id="main">
  <div class="hdr">
    <div class="hdr-av" id="av"></div>
    <span class="hdr-name" id="pname">—</span>
    <span class="hdr-tag">portafoglio </span>
  </div>

  <div id="notif">
    <i class="ti ti-confetti"></i>
    <span id="notif-text"></span>
  </div>

  <div class="bal-card">
    <div class="bal-lbl">💰 saldo attuale</div>
    <div class="bal-num" id="bal">—</div>
    <div class="bal-coin">YousCoin</div>
  </div>

  <div class="sec-lbl">cronologia</div>
  <div class="tx-list" id="txlist"><div class="empty">Caricamento...</div></div>
</div>

<div id="ios-hint">
  <div class="ios-row">
    <span style="font-size:20px">📲</span>
    <span class="ios-text">Installa YousCoin sulla schermata Home!</span>
    <button class="ios-close" onclick="dismissHint()">✕</button>
  </div>
  <div class="ios-steps">Tocca <strong>Condividi</strong> ↗ poi <strong>Aggiungi alla schermata Home</strong></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBdIsuV3e9ZFQpdL40gh-j7kIU3nPkljGw",
  authDomain:"wallet-9e30c.firebaseapp.com",
  databaseURL:"https://wallet-9e30c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"wallet-9e30c",
  storageBucket:"wallet-9e30c.firebasestorage.app",
  messagingSenderId:"881366691515",
  appId:"1:881366691515:web:b858e296e792e6d563039e"
});
const db = firebase.database();

const pid = new URLSearchParams(location.search).get('id');

// Manifest dinamico con start_url personalizzato per PWA
if (pid) {
  const m = {
    name: "YousCoin",
    short_name: "YousCoin",
    start_url: "/wallet/?id=" + pid,
    scope: "/wallet/",
    display: "standalone",
    background_color: "#f7fffe",
    theme_color: "#1D9E75",
    icons: [
      { src: "icons/icon-192.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: "icons/icon-512.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(m)], { type: "application/manifest+json" });
  document.getElementById("manifest-link").setAttribute("href", URL.createObjectURL(blob));
}

if (!pid) {
  show('error');
} else {
  let prev = null;

  db.ref('players/' + pid).on('value', s => {
    const d = s.val();
    if (!d) { show('error'); return; }
    show('main');

    // Avatar
    const inits = d.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const [bg, col] = palette(pid);
    const avEl = document.getElementById('av');
    avEl.textContent = inits;
    avEl.style.background = bg;
    avEl.style.color = col;
    document.getElementById('pname').textContent = d.name;

    // Balance
    const nb = d.balance || 0;
    const balEl = document.getElementById('bal');
    balEl.textContent = nb;
    if (prev !== null && nb !== prev) {
      balEl.classList.remove('bump');
      void balEl.offsetWidth;
      balEl.classList.add('bump');
    }
    if (prev !== null && nb > prev) {
      const diff = nb - prev;
      const note = d.lastTx ? d.lastTx.note : '';
      showNotif('+' + diff + ' YousCoin ricevuti! 🎉' + (note ? ' — "' + note + '"' : ''));
      doConfetti();
    }
    prev = nb;

    // History
    renderHistory(d.history);
  }, () => show('error'));
}

function show(s) {
  document.getElementById('loading').style.display = s === 'loading' ? 'flex' : 'none';
  document.getElementById('error').style.display   = s === 'error'   ? 'flex' : 'none';
  document.getElementById('main').style.display    = s === 'main'    ? 'flex' : 'none';
}

function palette(id) {
  const p = [
    ['#d0f2e7','#0F6E56'],['#FDF3DC','#9a6200'],['#ddeeff','#1a5cbf'],
    ['#ede8fb','#5b28b8'],['#ffe8e8','#b81a1a'],['#ffe0f5','#b0186e']
  ];
  let h = 0;
  for (const c of id) h = (h * 31 + c.charCodeAt(0)) % p.length;
  return p[h];
}

function renderHistory(history) {
  const el = document.getElementById('txlist');
  if (!history) {
    el.innerHTML = '<div class="empty">Nessuna transazione ancora 🌱</div>';
    return;
  }
  const txs = Object.values(history).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  el.innerHTML = txs.slice(0, 50).map(tx => {
    const pos = tx.amount >= 0;
    return '<div class="tx-item">'
      + '<div class="tx-ic ' + (pos ? 'in' : 'out') + '"><i class="ti ti-arrow-' + (pos ? 'up' : 'down') + '"></i></div>'
      + '<div class="tx-inf"><div class="tx-title">' + esc(tx.note || '—') + '</div>'
      + '<div class="tx-date">' + fmtDate(tx.timestamp) + '</div></div>'
      + '<div class="tx-val ' + (pos ? 'pos' : 'neg') + '">' + (pos ? '+' : '') + tx.amount + '</div>'
      + '</div>';
  }).join('');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  const time = d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
  if (diff < 86400000) return 'oggi, ' + time;
  if (diff < 172800000) return 'ieri, ' + time;
  return d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'}) + ', ' + time;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let notifTimer;
function showNotif(msg) {
  document.getElementById('notif-text').textContent = msg;
  document.getElementById('notif').style.display = 'flex';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { document.getElementById('notif').style.display = 'none'; }, 6000);
}

function doConfetti() {
  const cols = ['#1D9E75','#EF9F27','#4a90e2','#e05555','#9b6de8','#f5d87a','#ff9f43'];
  for (let i = 0; i < 60; i++) {
    const d = document.createElement('div');
    const sz = 6 + Math.random() * 9;
    const dur = 1.5 + Math.random() * 2;
    d.style.cssText = 'position:fixed;width:' + sz + 'px;height:' + sz + 'px;'
      + 'background:' + cols[Math.floor(Math.random() * cols.length)] + ';'
      + 'top:-10px;left:' + (Math.random() * 100) + 'vw;'
      + 'border-radius:' + (Math.random() > .5 ? '50%' : '3px') + ';'
      + 'animation:confettiFall ' + dur + 's ease-out forwards;'
      + 'animation-delay:' + (Math.random() * .7) + 's;'
      + 'z-index:9999;pointer-events:none';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), (dur + 1) * 1000);
  }
}

// iOS install hint
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && !localStorage.getItem('yc_ih')) {
  setTimeout(() => { document.getElementById('ios-hint').style.display = 'flex'; }, 3000);
}
function dismissHint() {
  document.getElementById('ios-hint').style.display = 'none';
  localStorage.setItem('yc_ih', '1');
}

// Service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
</body>
</html>
